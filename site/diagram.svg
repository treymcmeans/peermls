<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="aggGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#1648b8"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#94a3b8" letter-spacing="1">HOW PEERMLS WORKS</text>

  <!-- Connection lines between nodes -->
  <line x1="265" y1="130" x2="365" y2="130" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="535" y1="130" x2="635" y2="130" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Bidirectional arrows on node connections -->
  <polygon points="360,126 350,130 360,134" fill="#94a3b8"/>
  <polygon points="370,126 380,130 370,134" fill="#94a3b8"/>
  <polygon points="530,126 520,130 530,134" fill="#94a3b8"/>
  <polygon points="640,126 650,130 640,134" fill="#94a3b8"/>

  <!-- Node A -->
  <rect x="95" y="70" width="170" height="120" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="130" cy="100" r="16" fill="#dbeafe"/>
  <text x="130" y="105" text-anchor="middle" font-size="14">&#127970;</text>
  <text x="152" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Brokerage A</text>
  <text x="180" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Your listings</text>
  <rect x="115" y="145" width="130" height="28" rx="6" fill="#dbeafe"/>
  <text x="180" y="164" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1a56db">Node A</text>

  <!-- Node B -->
  <rect x="365" y="70" width="170" height="120" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="400" cy="100" r="16" fill="#dbeafe"/>
  <text x="400" y="105" text-anchor="middle" font-size="14">&#127970;</text>
  <text x="422" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Brokerage B</text>
  <text x="450" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Their listings</text>
  <rect x="385" y="145" width="130" height="28" rx="6" fill="#dbeafe"/>
  <text x="450" y="164" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1a56db">Node B</text>

  <!-- Node C -->
  <rect x="635" y="70" width="170" height="120" rx="12" fill="url(#nodeGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="670" cy="100" r="16" fill="#dbeafe"/>
  <text x="670" y="105" text-anchor="middle" font-size="14">&#127970;</text>
  <text x="692" y="105" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Brokerage C</text>
  <text x="720" y="128" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#64748b">Their listings</text>
  <rect x="655" y="145" width="130" height="28" rx="6" fill="#dbeafe"/>
  <text x="720" y="164" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1a56db">Node C</text>

  <!-- Vertical lines from nodes to aggregator -->
  <line x1="180" y1="190" x2="180" y2="260" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="450" y1="190" x2="450" y2="260" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="720" y1="190" x2="720" y2="260" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Horizontal connector -->
  <line x1="180" y1="260" x2="720" y2="260" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="450" y1="260" x2="450" y2="300" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Sync label -->
  <rect x="370" y="240" width="160" height="24" rx="12" fill="#f1f5f9"/>
  <text x="450" y="256" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">FEDERATED SYNC</text>

  <!-- Aggregator -->
  <rect x="325" y="300" width="250" height="100" rx="12" fill="url(#aggGrad)" filter="url(#shadow)"/>
  <text x="450" y="338" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Aggregator</text>
  <text x="450" y="360" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">Full network search</text>
  <rect x="370" y="372" width="160" height="20" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="450" y="386" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.7)">Anyone can query this</text>

  <!-- Lines from aggregator to tools -->
  <line x1="450" y1="400" x2="450" y2="440" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="150" y1="440" x2="750" y2="440" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="150" y1="440" x2="150" y2="470" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="310" y1="440" x2="310" y2="470" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="450" y1="440" x2="450" y2="470" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="590" y1="440" x2="590" y2="470" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="750" y1="440" x2="750" y2="470" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Open API label -->
  <rect x="380" y="428" width="140" height="24" rx="12" fill="#f1f5f9"/>
  <text x="450" y="444" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="0.5">OPEN API</text>

  <!-- Tool cards -->
  <!-- Consumer Apps -->
  <rect x="75" y="470" width="150" height="80" rx="10" fill="url(#toolGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="110" cy="498" r="14" fill="#fef3c7"/>
  <text x="110" y="503" text-anchor="middle" font-size="12">&#128270;</text>
  <text x="150" y="502" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Consumer</text>
  <text x="150" y="518" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Apps</text>
  <text x="150" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Property search</text>

  <!-- CMA Tools -->
  <rect x="235" y="470" width="150" height="80" rx="10" fill="url(#toolGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="270" cy="498" r="14" fill="#d1fae5"/>
  <text x="270" y="503" text-anchor="middle" font-size="12">&#128200;</text>
  <text x="310" y="502" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">CMA</text>
  <text x="310" y="518" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Tools</text>
  <text x="310" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Sold comps</text>

  <!-- Portals -->
  <rect x="395" y="470" width="110" height="80" rx="10" fill="url(#toolGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="425" cy="498" r="14" fill="#ede9fe"/>
  <text x="425" y="503" text-anchor="middle" font-size="12">&#127758;</text>
  <text x="450" y="510" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Portals</text>
  <text x="450" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Syndication</text>

  <!-- AI Agents -->
  <rect x="515" y="470" width="150" height="80" rx="10" fill="url(#toolGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="550" cy="498" r="14" fill="#e0e7ff"/>
  <text x="550" y="503" text-anchor="middle" font-size="12">&#129302;</text>
  <text x="590" y="502" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">AI</text>
  <text x="590" y="518" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Agents</text>
  <text x="590" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Transaction AI</text>

  <!-- Showings -->
  <rect x="675" y="470" width="150" height="80" rx="10" fill="url(#toolGrad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="710" cy="498" r="14" fill="#fce7f3"/>
  <text x="710" y="503" text-anchor="middle" font-size="12">&#128197;</text>
  <text x="750" y="510" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Showings</text>
  <text x="750" y="538" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#94a3b8">Scheduling</text>

  <!-- Bottom caption -->
  <text x="450" y="590" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Each brokerage controls their data. Tools compete on quality, not data access.</text>
  <text x="450" y="608" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#1a56db">peermls.org</text>
</svg>
